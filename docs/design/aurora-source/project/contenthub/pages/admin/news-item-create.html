<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@400;500;600&family=Instrument+Sans:wght@400;500;600&display=swap"/>
<style id="__colors_and_type__">/* __STANDALONE__ */
/* ============================================================
   ContentHub Design System — Semantic Token Layer
   ============================================================

   Two sibling themes share ONE contract:
     [data-theme="aurora-dusk"]   — premium dark, plum + teal, restrained glow
     [data-theme="obsidian-slate"] — cool light admin, indigo (original)

   Components MUST consume semantic tokens only. No raw hex.
   Layout, spacing, motion tokens are shared across themes.

   Contract surface:
     --bg-*         Surfaces (canvas, surface, elevated, inset, sidebar, overlay)
     --text-*       Foreground (primary, secondary, muted, disabled, inverse, on-accent)
     --border-*     Borders (subtle, default, strong, focus)
     --accent-*     Brand accents (primary, primary-hover, primary-muted, secondary, tertiary)
     --state-*      Semantic state (success, warning, danger, info) — each has bg/fg/border
     --glow-*       Ambient glows (accent, accent-strong, ring-focus)
     --gradient-*   Multi-stop gradients (brand, surface, aurora, mesh)
     --shadow-*     Elevation shadows (xs, sm, md, lg, xl, 2xl)
     --radius-*     Corner radii (xs, sm, md, lg, xl, pill, full)
     --space-*      Spacing scale (0, 0.5, 1, 1.5, 2, 3, 4, 5, 6, 8, 10, 12, 16)
     --font-*       Font family tokens
     --type-*       Typographic roles (display, h1..h3, body, caption, mono-*, label, number)
     --motion-*     Duration + easing
     --layout-*     Shell geometry (sidebar/header/panel widths)
   ============================================================ */


/* ------------------------------------------------------------
   1. Shared tokens — layout, spacing, radius, motion
   ------------------------------------------------------------ */
:root {
  /* Font families */
  --font-sans: "Geist", "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-display: "Geist", "Inter", ui-sans-serif, system-ui, sans-serif;
  --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Type scale — optical sizes, Swiss-modern restraint */
  --type-display-size: 2.625rem;   /* 42px — hero numbers, empty states */
  --type-display-weight: 500;
  --type-display-tracking: -0.035em;
  --type-display-leading: 1.05;

  --type-h1-size: 1.75rem;         /* 28px */
  --type-h1-weight: 500;
  --type-h1-tracking: -0.028em;
  --type-h1-leading: 1.15;

  --type-h2-size: 1.25rem;         /* 20px */
  --type-h2-weight: 500;
  --type-h2-tracking: -0.022em;
  --type-h2-leading: 1.25;

  --type-h3-size: 1rem;            /* 16px */
  --type-h3-weight: 500;
  --type-h3-tracking: -0.015em;
  --type-h3-leading: 1.35;

  --type-body-size: 0.875rem;      /* 14px */
  --type-body-weight: 400;
  --type-body-tracking: -0.005em;
  --type-body-leading: 1.5;

  --type-body-sm-size: 0.8125rem;  /* 13px */
  --type-body-sm-weight: 400;
  --type-body-sm-tracking: 0em;
  --type-body-sm-leading: 1.5;

  --type-caption-size: 0.75rem;    /* 12px */
  --type-caption-weight: 500;
  --type-caption-tracking: 0.01em;
  --type-caption-leading: 1.4;

  --type-label-size: 0.6875rem;    /* 11px — UPPERCASE labels */
  --type-label-weight: 500;
  --type-label-tracking: 0.12em;
  --type-label-leading: 1.3;

  --type-mono-size: 0.75rem;       /* 12px */
  --type-mono-weight: 450;
  --type-mono-tracking: -0.005em;
  --type-mono-leading: 1.45;

  --type-number-size: 1.625rem;    /* 26px — metric tile value */
  --type-number-weight: 500;
  --type-number-tracking: -0.03em;
  --type-number-leading: 1;

  /* Spacing — 4px base */
  --space-0: 0;
  --space-0-5: 0.125rem;   /* 2 */
  --space-1: 0.25rem;      /* 4 */
  --space-1-5: 0.375rem;   /* 6 */
  --space-2: 0.5rem;       /* 8 */
  --space-3: 0.75rem;      /* 12 */
  --space-4: 1rem;         /* 16 */
  --space-5: 1.25rem;      /* 20 */
  --space-6: 1.5rem;       /* 24 */
  --space-8: 2rem;         /* 32 */
  --space-10: 2.5rem;      /* 40 */
  --space-12: 3rem;        /* 48 */
  --space-16: 4rem;        /* 64 */

  /* Radii */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-2xl: 28px;
  --radius-pill: 9999px;
  --radius-full: 9999px;

  /* Motion */
  --motion-duration-instant: 80ms;
  --motion-duration-fast: 160ms;
  --motion-duration-normal: 240ms;
  --motion-duration-slow: 360ms;
  --motion-duration-slower: 560ms;

  --motion-ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --motion-ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --motion-ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
  --motion-ease-spring: cubic-bezier(0.34, 1.4, 0.64, 1);

  /* Layout */
  --layout-rail-width: 56px;
  --layout-panel-width: 264px;
  --layout-header-height: 52px;
  --layout-max-width: 1400px;
  --layout-page-padding-x: 1.75rem;
  --layout-page-padding-y: 1.25rem;
  --layout-gutter: 1rem;
}


/* ------------------------------------------------------------
   2. Aurora Dusk — premium dark, plum + teal
   ------------------------------------------------------------
   Deep plum night canvas with atmospheric teal lighting.
   Surfaces are layered panels lit from within.
   ------------------------------------------------------------ */
[data-theme="aurora-dusk"] {
  /* ---- Palette references (do not consume directly; use semantic tokens below) ---- */
  --_plum-25:  #f4eff8;
  --_plum-100: #2a1f3d;
  --_plum-200: #231934;
  --_plum-300: #1d1530;
  --_plum-400: #17112a;
  --_plum-500: #120d22;
  --_plum-600: #0d091a;
  --_plum-700: #090613;
  --_plum-800: #05030c;
  --_plum-900: #020106;

  --_teal-200: #8ee8d8;
  --_teal-300: #5ddacb;
  --_teal-400: #3bc8b8;
  --_teal-500: #26b6a6;
  --_teal-600: #1a9a8c;

  --_aurora-rose: #d88db8;   /* aurora tertiary accent */
  --_aurora-amber: #e8b87a;

  --_ink-50:  #f6f3fb;
  --_ink-100: #e8e3f0;
  --_ink-200: #c9c0d8;
  --_ink-300: #9f95b2;
  --_ink-400: #7c7291;
  --_ink-500: #5f566f;
  --_ink-600: #433c52;
  --_ink-700: #2e2838;

  /* ---- Semantic surfaces ---- */
  --bg-canvas:        #0d0818;                    /* deepest plum, the night */
  --bg-surface:       #17102a;                    /* cards, panels */
  --bg-elevated:      #1f1636;                    /* hovered / elevated surface */
  --bg-inset:         #0a0614;                    /* inputs, code, table header strips */
  --bg-sidebar:       #0a0614;                    /* rail background */
  --bg-sidebar-hover: #1a1030;
  --bg-sidebar-active:#25194a;
  --bg-overlay:       rgba(5, 3, 12, 0.72);       /* modal scrim */
  --bg-tooltip:       #25194a;

  /* ---- Foreground ---- */
  --text-primary:     #f6f3fb;                    /* body copy, titles */
  --text-secondary:   #c9c0d8;                    /* supporting text */
  --text-muted:       #8478a0;                    /* metadata, caption */
  --text-disabled:    #4a4160;
  --text-inverse:     #120d22;                    /* text on light accent */
  --text-on-accent:   #f6f3fb;                    /* text on primary accent */
  --text-link:        #5ddacb;

  /* ---- Borders ---- */
  --border-subtle:    rgba(201, 192, 216, 0.06);  /* hairline across surface */
  --border-default:   rgba(201, 192, 216, 0.10);
  --border-strong:    rgba(201, 192, 216, 0.18);
  --border-contrast:  rgba(201, 192, 216, 0.28);
  --border-focus:     #5ddacb;

  /* ---- Accents ---- */
  --accent-primary:        #3bc8b8;               /* teal — actions, active states */
  --accent-primary-hover:  #5ddacb;
  --accent-primary-muted:  rgba(59, 200, 184, 0.14);
  --accent-primary-strong: #26b6a6;

  --accent-secondary:        #b07ad8;             /* aurora plum — link/highlight */
  --accent-secondary-hover:  #c495e0;
  --accent-secondary-muted:  rgba(176, 122, 216, 0.14);

  --accent-tertiary:        #e8b87a;              /* warm aurora edge — used sparingly */
  --accent-tertiary-muted:  rgba(232, 184, 122, 0.14);

  /* ---- Semantic states ---- */
  --state-success-bg:      rgba(74, 222, 164, 0.10);
  --state-success-fg:      #6be2b5;
  --state-success-border:  rgba(107, 226, 181, 0.25);

  --state-warning-bg:      rgba(245, 183, 97, 0.10);
  --state-warning-fg:      #f5b761;
  --state-warning-border:  rgba(245, 183, 97, 0.25);

  --state-danger-bg:       rgba(244, 114, 124, 0.10);
  --state-danger-fg:       #f4727c;
  --state-danger-border:   rgba(244, 114, 124, 0.25);

  --state-info-bg:         rgba(122, 162, 247, 0.10);
  --state-info-fg:         #8ab4f8;
  --state-info-border:     rgba(138, 180, 248, 0.25);

  --state-neutral-bg:      rgba(201, 192, 216, 0.08);
  --state-neutral-fg:      #c9c0d8;
  --state-neutral-border:  rgba(201, 192, 216, 0.18);

  /* ---- Glows (restrained) ---- */
  --glow-accent:        0 0 24px -4px rgba(59, 200, 184, 0.28);
  --glow-accent-strong: 0 0 42px -6px rgba(59, 200, 184, 0.42);
  --glow-secondary:     0 0 28px -6px rgba(176, 122, 216, 0.28);
  --glow-ring-focus:    0 0 0 2px rgba(59, 200, 184, 0.24);
  --glow-panel-edge:    inset 0 1px 0 rgba(255, 255, 255, 0.04);

  /* ---- Gradients (aurora signature) ---- */
  --gradient-brand:
    linear-gradient(135deg, #26b6a6 0%, #3bc8b8 45%, #b07ad8 100%);
  --gradient-brand-subtle:
    linear-gradient(135deg, rgba(59, 200, 184, 0.16) 0%, rgba(176, 122, 216, 0.16) 100%);
  --gradient-surface:
    linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0) 100%);
  --gradient-aurora:
    radial-gradient(60% 80% at 15% 0%, rgba(176, 122, 216, 0.14) 0%, transparent 60%),
    radial-gradient(70% 90% at 85% 100%, rgba(59, 200, 184, 0.12) 0%, transparent 55%),
    linear-gradient(180deg, #0d0818 0%, #0a0614 100%);
  --gradient-aurora-soft:
    radial-gradient(50% 80% at 20% 0%, rgba(176, 122, 216, 0.10) 0%, transparent 60%),
    radial-gradient(60% 80% at 80% 100%, rgba(59, 200, 184, 0.08) 0%, transparent 55%);
  --gradient-mesh:
    radial-gradient(circle at 20% 20%, rgba(176, 122, 216, 0.20), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(59, 200, 184, 0.16), transparent 42%),
    radial-gradient(circle at 50% 50%, rgba(232, 184, 122, 0.06), transparent 60%);
  --gradient-card-edge:
    linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0) 30%);

  /* ---- Shadows (cinematic, deep) ---- */
  --shadow-xs:  0 1px 0 0 rgba(0, 0, 0, 0.4);
  --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.02);
  --shadow-md:  0 4px 12px rgba(0, 0, 0, 0.35), 0 1px 2px rgba(0, 0, 0, 0.2);
  --shadow-lg:  0 12px 28px rgba(0, 0, 0, 0.45), 0 2px 4px rgba(0, 0, 0, 0.25);
  --shadow-xl:  0 24px 48px rgba(0, 0, 0, 0.55), 0 4px 8px rgba(0, 0, 0, 0.3);
  --shadow-2xl: 0 40px 80px rgba(0, 0, 0, 0.65), 0 8px 16px rgba(0, 0, 0, 0.35);

  /* ---- Color-scheme hint for native controls ---- */
  color-scheme: dark;
}


/* ------------------------------------------------------------
   3. Obsidian Slate — sibling theme (kept from original system)
   ------------------------------------------------------------
   Cool indigo/slate admin. Light surfaces, compact density.
   Same contract, swapped values. Layout geometry stays the same.
   ------------------------------------------------------------ */
[data-theme="obsidian-slate"] {
  --bg-canvas:        #f0f2f7;
  --bg-surface:       #ffffff;
  --bg-elevated:      #ffffff;
  --bg-inset:         #e8ebf2;
  --bg-sidebar:       #111520;
  --bg-sidebar-hover: #1a1f2d;
  --bg-sidebar-active:#22293b;
  --bg-overlay:       rgba(15, 18, 25, 0.45);
  --bg-tooltip:       #1a1f2b;

  --text-primary:     #1a1f2b;
  --text-secondary:   #475069;
  --text-muted:       #6b7690;
  --text-disabled:    #a5adbf;
  --text-inverse:     #ffffff;
  --text-on-accent:   #ffffff;
  --text-link:        #3b50e6;

  --border-subtle:    #e2e6ee;
  --border-default:   #d0d5e0;
  --border-strong:    #b5bcc9;
  --border-contrast:  #8a95ab;
  --border-focus:     #3b50e6;

  --accent-primary:        #3b50e6;
  --accent-primary-hover:  #4f68f7;
  --accent-primary-muted:  rgba(79, 104, 247, 0.12);
  --accent-primary-strong: #2d40c4;

  --accent-secondary:        #7c3aed;
  --accent-secondary-hover:  #8b5cf6;
  --accent-secondary-muted:  rgba(124, 58, 237, 0.10);

  --accent-tertiary:        #f0a000;
  --accent-tertiary-muted:  rgba(240, 160, 0, 0.12);

  --state-success-bg:      #e6f6ea;
  --state-success-fg:      #1a7f37;
  --state-success-border:  #9fd8ae;

  --state-warning-bg:      #fef3e2;
  --state-warning-fg:      #a6660a;
  --state-warning-border:  #f0c97e;

  --state-danger-bg:       #fde7e9;
  --state-danger-fg:       #b42334;
  --state-danger-border:   #eba1a8;

  --state-info-bg:         #e5edfc;
  --state-info-fg:         #2149b8;
  --state-info-border:     #a5bbf0;

  --state-neutral-bg:      #eef0f5;
  --state-neutral-fg:      #475069;
  --state-neutral-border:  #d0d5e0;

  --glow-accent:        0 0 0 1px rgba(59, 80, 230, 0.08);
  --glow-accent-strong: 0 0 0 2px rgba(59, 80, 230, 0.16);
  --glow-secondary:     0 0 0 1px rgba(124, 58, 237, 0.10);
  --glow-ring-focus:    0 0 0 4px rgba(59, 80, 230, 0.16);
  --glow-panel-edge:    inset 0 1px 0 rgba(255, 255, 255, 0.5);

  --gradient-brand:
    linear-gradient(135deg, #3b50e6 0%, #4f68f7 50%, #7c3aed 100%);
  --gradient-brand-subtle:
    linear-gradient(135deg, rgba(79, 104, 247, 0.10) 0%, rgba(124, 58, 237, 0.08) 100%);
  --gradient-surface:
    linear-gradient(180deg, #ffffff 0%, #fafbfd 100%);
  --gradient-aurora:
    radial-gradient(50% 60% at 15% 5%, rgba(79, 104, 247, 0.04) 0%, transparent 60%),
    radial-gradient(55% 65% at 85% 95%, rgba(124, 58, 237, 0.03) 0%, transparent 60%),
    linear-gradient(180deg, #f0f2f7 0%, #eaeef5 100%);
  --gradient-aurora-soft:
    radial-gradient(40% 60% at 20% 0%, rgba(79, 104, 247, 0.03) 0%, transparent 60%);
  --gradient-mesh:
    radial-gradient(circle at 20% 20%, rgba(79, 104, 247, 0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(124, 58, 237, 0.06), transparent 42%);
  --gradient-card-edge:
    linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0) 30%);

  --shadow-xs:  0 1px 2px rgba(15, 18, 25, 0.05);
  --shadow-sm:  0 1px 3px rgba(15, 18, 25, 0.06), 0 1px 2px rgba(15, 18, 25, 0.04);
  --shadow-md:  0 4px 8px rgba(15, 18, 25, 0.08), 0 2px 4px rgba(15, 18, 25, 0.05);
  --shadow-lg:  0 12px 24px rgba(15, 18, 25, 0.10), 0 4px 8px rgba(15, 18, 25, 0.06);
  --shadow-xl:  0 20px 40px rgba(15, 18, 25, 0.12), 0 8px 16px rgba(15, 18, 25, 0.08);
  --shadow-2xl: 0 32px 64px rgba(15, 18, 25, 0.18), 0 12px 24px rgba(15, 18, 25, 0.10);

  color-scheme: light;
}


/* ------------------------------------------------------------
   4. Default theme (no data-theme attribute = aurora-dusk)
   ------------------------------------------------------------ */
:root:not([data-theme]) {
  /* Inherit aurora-dusk as the default showcase */
}


/* ------------------------------------------------------------
   5. Typographic role classes — consume the tokens
   ------------------------------------------------------------ */
.type-display {
  font-family: var(--font-display);
  font-size: var(--type-display-size);
  font-weight: var(--type-display-weight);
  letter-spacing: var(--type-display-tracking);
  line-height: var(--type-display-leading);
  font-feature-settings: "ss01", "ss02", "cv11";
}
.type-h1 {
  font-family: var(--font-display);
  font-size: var(--type-h1-size);
  font-weight: var(--type-h1-weight);
  letter-spacing: var(--type-h1-tracking);
  line-height: var(--type-h1-leading);
}
.type-h2 {
  font-family: var(--font-display);
  font-size: var(--type-h2-size);
  font-weight: var(--type-h2-weight);
  letter-spacing: var(--type-h2-tracking);
  line-height: var(--type-h2-leading);
}
.type-h3 {
  font-family: var(--font-sans);
  font-size: var(--type-h3-size);
  font-weight: var(--type-h3-weight);
  letter-spacing: var(--type-h3-tracking);
  line-height: var(--type-h3-leading);
}
.type-body {
  font-family: var(--font-sans);
  font-size: var(--type-body-size);
  font-weight: var(--type-body-weight);
  letter-spacing: var(--type-body-tracking);
  line-height: var(--type-body-leading);
}
.type-body-sm {
  font-family: var(--font-sans);
  font-size: var(--type-body-sm-size);
  line-height: var(--type-body-sm-leading);
}
.type-caption {
  font-family: var(--font-sans);
  font-size: var(--type-caption-size);
  font-weight: var(--type-caption-weight);
  letter-spacing: var(--type-caption-tracking);
  line-height: var(--type-caption-leading);
}
.type-label {
  font-family: var(--font-sans);
  font-size: var(--type-label-size);
  font-weight: var(--type-label-weight);
  letter-spacing: var(--type-label-tracking);
  line-height: var(--type-label-leading);
  text-transform: uppercase;
}
.type-mono {
  font-family: var(--font-mono);
  font-size: var(--type-mono-size);
  font-weight: var(--type-mono-weight);
  letter-spacing: var(--type-mono-tracking);
  line-height: var(--type-mono-leading);
  font-variant-numeric: tabular-nums;
}
.type-number {
  font-family: var(--font-display);
  font-size: var(--type-number-size);
  font-weight: var(--type-number-weight);
  letter-spacing: var(--type-number-tracking);
  line-height: var(--type-number-leading);
  font-variant-numeric: tabular-nums;
  font-feature-settings: "ss01", "tnum";
}


/* ------------------------------------------------------------
   6. Base reset for preview documents
   ------------------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-canvas);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: var(--type-body-size);
  line-height: var(--type-body-leading);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-variant-numeric: tabular-nums;
  text-rendering: optimizeLegibility;
}
button {
  font-family: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
input, select, textarea {
  font-family: inherit;
  color: inherit;
}

/* ------------------------------------------------------------
   7. Keyframes — used across primitives
   ------------------------------------------------------------ */
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
@keyframes aurora-drift {
  0%, 100% { transform: translate3d(0, 0, 0); }
  50%      { transform: translate3d(-2%, 1%, 0); }
}
@keyframes pulse-glow {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.5; }
}

</style>
<style id="__cockpit__">
/* ============================================================
   ContentHub — Cockpit Layout
   A third layout paradigm, distinct from Classic and Horizon.
   ============================================================

   Shell geometry:
     +---------------------------------------------------------+
     | context-bar  (48px — workspace switcher + breadcrumbs)  |
     +----+-----------------------------+----------------------+
     | r  |                             |                      |
     | a  |                             |   inspector drawer   |
     | i  |      workbench              |   (collapsible)      |
     | l  |                             |                      |
     | 56 |                             |                      |
     +----+-----------------------------+----------------------+
     | status-bar  (28px — render queue + system telemetry)    |
     +---------------------------------------------------------+

   Hard rules:
   - rail: icon-only, 56px wide, NO labels (tooltips on hover)
   - context-bar: workspace + breadcrumbs + global search + user
   - inspector: slides in from the right, 340px wide, toggleable
   - status-bar: ALWAYS visible, live render queue indicators
   - workbench fills the remaining space; its content is per-page
   ============================================================ */

/* ---- Base ---- */
html, body, #root {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
body {
  background: var(--bg-canvas);
  color: var(--text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  line-height: 1.5;
}
*, *::before, *::after { box-sizing: border-box; }
button { font-family: inherit; border: none; background: none; cursor: pointer; padding: 0; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: var(--text-link, var(--accent-primary)); text-decoration: none; }
::selection { background: var(--accent-primary-muted); color: var(--accent-primary-hover); }

/* ---- Scrollbars ---- */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb {
  background: var(--border-default);
  border-radius: 10px;
  border: 3px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover { background: var(--border-strong); background-clip: padding-box; border: 3px solid transparent; }

/* ============================================================
   Cockpit shell
   ============================================================ */
.cockpit {
  height: 100vh;
  display: grid;
  grid-template-columns: 56px 1fr;
  grid-template-rows: 48px 1fr 28px;
  grid-template-areas:
    "ctxbar ctxbar"
    "rail   body"
    "status status";
  background: var(--bg-canvas);
  position: relative;
  overflow: hidden;
}

/* ---- Context bar (top) ---- */
.ctxbar {
  grid-area: ctxbar;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px 0 0;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border-default);
  color: var(--text-secondary);
  position: relative;
  z-index: 10;
}
.ctxbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 56px;
  height: 48px;
  justify-content: center;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-default);
  color: var(--text-on-accent);
  font-family: var(--font-display);
  font-weight: 500;
}
.ctxbar-brand .brand-mark {
  width: 26px; height: 26px; border-radius: 7px;
  background: var(--gradient-brand);
  display: grid; place-items: center;
  color: var(--text-on-accent);
  box-shadow: var(--glow-accent);
  font-size: 13px;
}

.workspace-pill {
  display: inline-flex; align-items: center; gap: 8px;
  height: 30px; padding: 0 12px;
  background: var(--bg-inset);
  border: 1px solid var(--border-default);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-on-sidebar, #f6f3fb);
  font-family: var(--font-mono);
  cursor: pointer;
  transition: border-color .16s var(--motion-ease-out);
}
.ctxbar .workspace-pill { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); color: #e5e9f5; }
.ctxbar .workspace-pill:hover { border-color: rgba(255,255,255,0.25); }
.workspace-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--state-success-fg); box-shadow: 0 0 8px var(--state-success-fg); }

.breadcrumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.62);
}
.breadcrumbs .sep { color: rgba(255,255,255,0.32); font-family: var(--font-mono); }
.breadcrumbs .crumb { color: rgba(255,255,255,0.62); }
.breadcrumbs .crumb.last { color: #f6f3fb; font-weight: 500; }

.ctxbar-search {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
  height: 30px;
  width: 340px;
  padding: 0 10px 0 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  cursor: pointer;
  transition: border-color .16s var(--motion-ease-out);
}
.ctxbar-search:hover { border-color: rgba(255,255,255,0.25); color: #fff; }
.ctxbar-search .k {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  color: rgba(255,255,255,0.7);
}
.ctxbar-action {
  width: 30px; height: 30px; border-radius: 8px;
  display: grid; place-items: center;
  color: rgba(255,255,255,0.7);
  position: relative;
  transition: background .12s, color .12s;
}
.ctxbar-action:hover { background: rgba(255,255,255,0.08); color: #fff; }
.ctxbar-action .pip { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--state-danger-fg); box-shadow: 0 0 6px var(--state-danger-fg); }
.ctxbar-user {
  display: flex; align-items: center; gap: 8px;
  padding: 3px 10px 3px 3px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  color: #e5e9f5;
  font-size: 12px;
  transition: border-color .12s;
}
.ctxbar-user:hover { border-color: rgba(255,255,255,0.25); }
.ctxbar-user .avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--gradient-brand);
  display: grid; place-items: center;
  color: var(--text-on-accent); font-size: 10px; font-weight: 600;
  box-shadow: var(--glow-accent);
}

/* ---- Rail (left) ---- */
.rail {
  grid-area: rail;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-default);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0;
  gap: 2px;
  position: relative;
  z-index: 5;
}
.rail-item {
  width: 40px; height: 40px; border-radius: 10px;
  display: grid; place-items: center;
  color: rgba(255,255,255,0.5);
  position: relative;
  cursor: pointer;
  transition: color .12s var(--motion-ease-out), background .12s var(--motion-ease-out);
}
.rail-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
.rail-item.active {
  color: var(--accent-primary);
  background: rgba(79,104,247,0.12);
}
.rail-item.active::before {
  content: ""; position: absolute; left: -1px; top: 10px; bottom: 10px;
  width: 2px; border-radius: 2px;
  background: var(--accent-primary);
  box-shadow: 0 0 8px var(--accent-primary);
}
.rail-item .count {
  position: absolute; top: 4px; right: 4px;
  font-family: var(--font-mono); font-size: 9px; font-weight: 600;
  background: var(--accent-primary); color: #fff;
  padding: 1px 4px; border-radius: 8px;
  line-height: 1;
}
.rail-divider {
  width: 24px; height: 1px; margin: 6px 0;
  background: rgba(255,255,255,0.1);
}
.rail-spacer { flex: 1; }

/* Rail tooltip */
.rail-item .tt {
  position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
  background: var(--bg-tooltip, #1a1f2b);
  color: #fff;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity .12s, transform .12s;
  z-index: 20;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: var(--shadow-lg);
}
.rail-item:hover .tt { opacity: 1; transform: translateY(-50%) translateX(4px); }

/* ---- Body ---- */
.body {
  grid-area: body;
  display: grid;
  grid-template-columns: 1fr 340px;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
  position: relative;
}
.body.no-inspector {
  grid-template-columns: 1fr;
}
.workbench {
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0;
  background: var(--bg-canvas);
  min-width: 0;
  min-height: 0;
  position: relative;
}
.workbench::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 180px;
  background: var(--gradient-aurora-soft);
  pointer-events: none;
  z-index: 0;
}
.workbench > * { position: relative; z-index: 1; }

.inspector {
  border-left: 1px solid var(--border-default);
  background: var(--bg-surface);
  overflow-y: auto;
  padding: 16px 18px 20px;
  min-width: 0;
  display: flex; flex-direction: column; gap: 16px;
}
.inspector-head {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-subtle);
}
.inspector-head .title {
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted);
  flex: 1;
}
.inspector-head .close {
  width: 24px; height: 24px; border-radius: 6px;
  display: grid; place-items: center;
  color: var(--text-muted);
  transition: background .12s;
}
.inspector-head .close:hover { background: var(--bg-inset); color: var(--text-primary); }

.inspector-section {
  display: flex; flex-direction: column; gap: 8px;
}
.inspector-section-title {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-muted);
}
.inspector-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
}
.inspector-row .k { color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; width: 110px; flex-shrink: 0; }
.inspector-row .v { color: var(--text-primary); flex: 1; font-family: var(--font-mono); font-size: 11px; }

/* ---- Status bar (bottom) ---- */
.statusbar {
  grid-area: status;
  display: flex; align-items: center; gap: 18px;
  padding: 0 14px;
  background: var(--bg-sidebar);
  border-top: 1px solid var(--border-default);
  color: rgba(255,255,255,0.55);
  font-family: var(--font-mono);
  font-size: 11px;
  position: relative;
  z-index: 5;
}
.statusbar .cell {
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.statusbar .cell .dot { width: 6px; height: 6px; border-radius: 50%; }
.statusbar .cell.ok .dot { background: var(--state-success-fg); box-shadow: 0 0 6px var(--state-success-fg); }
.statusbar .cell.warn .dot { background: var(--state-warning-fg); box-shadow: 0 0 6px var(--state-warning-fg); }
.statusbar .cell.err .dot { background: var(--state-danger-fg); box-shadow: 0 0 6px var(--state-danger-fg); }
.statusbar .cell.info .dot { background: var(--state-info-fg); box-shadow: 0 0 6px var(--state-info-fg); }
.statusbar .cell .v { color: #cfd4e2; }
.statusbar .spacer { flex: 1; }
.statusbar .cell.clickable { cursor: pointer; transition: color .12s; }
.statusbar .cell.clickable:hover { color: #fff; }

/* The animated render chip on the status bar */
.statusbar .render-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 0 10px; height: 20px;
  background: rgba(79,104,247,0.1);
  border: 1px solid rgba(79,104,247,0.35);
  border-radius: 10px;
  color: #c8d0fb;
  cursor: pointer;
}
.statusbar .render-chip .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-primary);
  box-shadow: 0 0 8px var(--accent-primary);
  animation: status-pulse 1.4s ease-in-out infinite;
}
@keyframes status-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ============================================================
   Page scaffolding
   ============================================================ */
.page {
  padding: 24px 28px 40px;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
  animation: page-enter .32s var(--motion-ease-out);
}
@keyframes page-enter {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.page-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; margin-bottom: 22px;
}
.page-head h1 {
  margin: 0;
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: -0.025em;
  color: var(--text-primary);
  line-height: 1.15;
}
.page-head .sub {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-muted);
}

/* ---- Section ---- */
.section {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 24px;
}
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 16px;
}
.section-head .title {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.005em;
}
.section-head .meta {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
}

/* ---- Card ---- */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(15,18,25,0.04), 0 4px 14px rgba(15,18,25,0.04);
  overflow: hidden;
  transition: border-color .16s, box-shadow .16s;
}
.card:hover {
  border-color: var(--border-strong);
  box-shadow: 0 2px 6px rgba(15,18,25,0.06), 0 10px 22px rgba(15,18,25,0.06);
}
.card-pad { padding: 18px 20px; }
.card-tight { padding: 12px 14px; }

/* ---- Grid helpers ---- */
.grid { display: grid; gap: 14px; }
.g-2 { grid-template-columns: repeat(2, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-4 { grid-template-columns: repeat(4, 1fr); }
.hstack { display: flex; align-items: center; gap: 10px; }
.vstack { display: flex; flex-direction: column; gap: 8px; }
.grow { flex: 1; }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ---- Labels ---- */
.overline {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-muted);
}
.caption { font-size: 11px; color: var(--text-muted); }

/* ============================================================
   Component library (buttons, chips, pills, inputs)
   ============================================================ */

/* Button */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  height: 30px; padding: 0 14px;
  border-radius: 8px;
  font-size: 12px; font-weight: 500;
  letter-spacing: -0.005em;
  white-space: nowrap;
  transition: all .14s var(--motion-ease-out);
  border: 1px solid transparent;
}
.btn.sm { height: 26px; padding: 0 10px; font-size: 11px; gap: 4px; }
.btn.lg { height: 36px; padding: 0 18px; font-size: 13px; }
.btn.icon { padding: 0; width: 30px; }
.btn.sm.icon { width: 26px; }
.btn.primary {
  background: var(--gradient-brand);
  color: var(--text-on-accent);
  box-shadow: 0 1px 3px rgba(79,104,247,0.3), 0 0 0 1px rgba(79,104,247,0.5) inset;
}
.btn.primary:hover { box-shadow: 0 2px 8px rgba(79,104,247,0.45), 0 0 0 1px rgba(79,104,247,0.6) inset; }
.btn.secondary {
  background: var(--bg-surface);
  color: var(--text-primary);
  border-color: var(--border-default);
}
.btn.secondary:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
.btn.ghost { color: var(--text-secondary); }
.btn.ghost:hover { background: var(--bg-inset); color: var(--text-primary); }
.btn.danger { background: var(--state-danger-bg); color: var(--state-danger-fg); border-color: var(--state-danger-border); }
.btn.dark {
  background: rgba(255,255,255,0.06);
  color: #e5e9f5;
  border-color: rgba(255,255,255,0.16);
}
.btn.dark:hover { background: rgba(255,255,255,0.1); }

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  height: 22px; padding: 0 9px;
  border-radius: 11px;
  font-family: var(--font-mono); font-size: 11px;
  background: var(--bg-inset);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
}
.chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.chip.ok { color: var(--state-success-fg); background: var(--state-success-bg); border-color: var(--state-success-border); }
.chip.ok .dot { background: var(--state-success-fg); box-shadow: 0 0 6px var(--state-success-fg); }
.chip.warn { color: var(--state-warning-fg); background: var(--state-warning-bg); border-color: var(--state-warning-border); }
.chip.warn .dot { background: var(--state-warning-fg); box-shadow: 0 0 6px var(--state-warning-fg); }
.chip.err { color: var(--state-danger-fg); background: var(--state-danger-bg); border-color: var(--state-danger-border); }
.chip.err .dot { background: var(--state-danger-fg); box-shadow: 0 0 6px var(--state-danger-fg); }
.chip.info { color: var(--state-info-fg); background: var(--state-info-bg); border-color: var(--state-info-border); }
.chip.info .dot { background: var(--state-info-fg); box-shadow: 0 0 6px var(--state-info-fg); }
.chip.brand { color: var(--accent-primary-hover); background: var(--accent-primary-muted); border-color: rgba(79,104,247,0.3); }
.chip.brand .dot { background: var(--accent-primary); box-shadow: 0 0 6px var(--accent-primary); }

/* Input */
.input {
  height: 32px; padding: 0 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color .14s, box-shadow .14s;
}
.input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(79,104,247,0.15); }
.input::placeholder { color: var(--text-muted); }
.input.mono { font-family: var(--font-mono); font-size: 12px; }

/* Keyboard chip */
.kbd {
  display: inline-flex; align-items: center; gap: 2px;
  font-family: var(--font-mono); font-size: 10px;
  padding: 1px 6px; border-radius: 4px;
  background: var(--bg-inset);
  border: 1px solid var(--border-default);
  color: var(--text-muted);
}

/* ============================================================
   Specialized patterns
   ============================================================ */

/* Progress bar */
.pbar {
  height: 4px; border-radius: 2px;
  background: var(--bg-inset);
  overflow: hidden;
  position: relative;
}
.pbar .fill {
  height: 100%;
  background: var(--gradient-brand);
  border-radius: 2px;
  transition: width .4s var(--motion-ease-out);
  box-shadow: 0 0 8px rgba(79,104,247,0.4);
}
.pbar.done .fill { background: var(--state-success-fg); box-shadow: none; }

/* Metric tile */
.metric {
  position: relative;
  padding: 16px 18px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 12px;
  overflow: hidden;
}
.metric .accent {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gradient-brand);
}
.metric .lbl {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-muted);
}
.metric .val {
  font-family: var(--font-display);
  font-size: 30px; font-weight: 500;
  letter-spacing: -0.03em;
  color: var(--text-primary);
  margin-top: 8px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.metric .delta { font-family: var(--font-mono); font-size: 11px; margin-left: 8px; }
.metric .delta.pos { color: var(--state-success-fg); }
.metric .delta.neg { color: var(--state-danger-fg); }
.metric .delta.warn { color: var(--state-warning-fg); }
.metric .delta.mute { color: var(--text-muted); }

/* Table */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tbl th {
  text-align: left;
  padding: 10px 14px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-muted);
  background: var(--bg-inset);
  border-bottom: 1px solid var(--border-default);
  white-space: nowrap;
}
.tbl td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-primary);
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: var(--bg-inset); }
.tbl tr.selected td { background: var(--accent-primary-muted); box-shadow: inset 2px 0 0 var(--accent-primary); }

/* Checkbox */
.cbox {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1px solid var(--border-strong);
  background: var(--bg-surface);
  display: grid; place-items: center;
  cursor: pointer;
  transition: all .12s;
}
.cbox.on { background: var(--accent-primary); border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(79,104,247,0.15); }
.cbox.on svg { color: #fff; }

/* Spark */
.spark { height: 28px; width: 100%; display: block; }

/* Command palette */
.modal-veil {
  position: fixed; inset: 0;
  background: rgba(15,18,25,0.5);
  backdrop-filter: blur(6px);
  display: grid; place-items: flex-start center;
  padding-top: 12vh;
  z-index: 100;
  animation: fade-in .16s var(--motion-ease-out);
}
@keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }
.palette {
  width: min(640px, 92vw);
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 14px;
  box-shadow: 0 24px 64px rgba(15,18,25,0.25);
  overflow: hidden;
  animation: pop-in .2s var(--motion-ease-out);
}
@keyframes pop-in { from { opacity: 0; transform: translateY(-8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* Drawer */
.drawer-veil {
  position: fixed; inset: 0;
  background: rgba(15,18,25,0.35);
  z-index: 90;
  animation: fade-in .2s;
}
.drawer {
  position: fixed; right: 0; top: 0; bottom: 28px;
  width: min(520px, 90vw);
  background: var(--bg-surface);
  border-left: 1px solid var(--border-default);
  box-shadow: -24px 0 48px rgba(15,18,25,0.12);
  z-index: 95;
  display: flex; flex-direction: column;
  animation: slide-in .24s var(--motion-ease-out);
}
@keyframes slide-in { from { transform: translateX(100%) } to { transform: translateX(0) } }

/* Toast */
.toast-zone {
  position: fixed; bottom: 44px; right: 20px; z-index: 110;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  min-width: 260px; max-width: 360px;
  padding: 10px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-left: 3px solid var(--accent-primary);
  border-radius: 8px;
  box-shadow: 0 8px 28px rgba(15,18,25,0.15);
  font-size: 12px;
  animation: slide-right .2s;
}
.toast.ok { border-left-color: var(--state-success-fg); }
.toast.err { border-left-color: var(--state-danger-fg); }
@keyframes slide-right { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }

/* ============================================================
   Preview-First Primitives — QuickLook, Drawer, MediaPreview
   ============================================================ */

/* ---- Media Preview ---- */
.media-preview {
  position: relative;
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .16s var(--motion-ease-out), box-shadow .16s var(--motion-ease-out);
  display: block;
  flex-shrink: 0;
}
.media-preview:hover {
  border-color: var(--accent-primary);
  box-shadow: var(--glow-accent);
}
.media-preview.thumb { width: 96px; aspect-ratio: 16/9; border-radius: var(--radius-sm); }
.media-preview.card { width: 100%; aspect-ratio: 16/9; }
.media-preview.hero { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); }
.media-preview.audio { width: 100%; height: 32px; aspect-ratio: auto; }

.media-preview .mp-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  background-color: var(--bg-inset);
}
.media-preview .mp-skeleton {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--bg-inset) 0%, var(--bg-elevated) 50%, var(--bg-inset) 100%);
  background-size: 400% 100%;
  animation: shimmer 1.8s infinite;
}
@keyframes shimmer {
  0% { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}
.media-preview .mp-play {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  opacity: 0;
  transition: opacity .14s var(--motion-ease-out);
  background: rgba(0,0,0,0.25);
}
.media-preview:hover .mp-play { opacity: 1; }
.media-preview .mp-play .pbtn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.95);
  display: grid; place-items: center;
  color: var(--text-inverse);
  box-shadow: var(--shadow-lg);
}
.media-preview.thumb .mp-play .pbtn { width: 28px; height: 28px; }

.media-preview .mp-meta {
  position: absolute; left: 6px; bottom: 6px; right: 6px;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.media-preview .mp-meta .duration {
  background: rgba(0,0,0,0.7);
  padding: 1px 5px; border-radius: 3px;
}
.media-preview .mp-meta .quality {
  background: rgba(255,255,255,0.85);
  color: var(--text-inverse);
  padding: 1px 5px; border-radius: 3px;
  font-weight: 600;
}
.media-preview .mp-quicklook {
  position: absolute; top: 6px; right: 6px;
  width: 24px; height: 24px; border-radius: 5px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  display: grid; place-items: center;
  opacity: 0;
  transition: opacity .14s;
}
.media-preview:hover .mp-quicklook { opacity: 1; }
.media-preview .mp-quicklook:hover { background: var(--accent-primary); }

.media-preview.error {
  display: grid; place-items: center;
  color: var(--state-danger-fg);
  background: var(--state-danger-bg);
  border-color: var(--state-danger-border);
}

/* ---- Audio waveform ---- */
.media-preview.audio {
  display: flex; align-items: center; gap: 8px;
  padding: 0 10px;
  cursor: pointer;
}
.media-preview.audio .waveform {
  flex: 1;
  display: flex; align-items: center; gap: 2px;
  height: 20px;
}
.media-preview.audio .waveform .bar {
  flex: 1;
  background: var(--accent-primary);
  border-radius: 1px;
  opacity: 0.5;
}
.media-preview.audio .waveform .bar.played { opacity: 1; }

/* ---- QuickLook overlay ---- */
.quicklook-veil {
  position: fixed; inset: 0;
  background: var(--bg-overlay);
  backdrop-filter: blur(8px);
  display: grid; place-items: center;
  z-index: 200;
  animation: fade-in .16s var(--motion-ease-out);
}
.quicklook {
  width: min(880px, 92vw);
  max-height: 86vh;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-2xl);
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: ql-scale-in .2s var(--motion-ease-out);
}
@keyframes ql-scale-in {
  from { opacity: 0; transform: scale(0.94); }
  to { opacity: 1; transform: scale(1); }
}
.quicklook-head {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
}
.quicklook-head .ql-thumb {
  width: 48px; height: 48px; border-radius: var(--radius-sm);
  background: var(--bg-inset);
  background-size: cover; background-position: center;
  border: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.quicklook-head .ql-titles { flex: 1; min-width: 0; }
.quicklook-head .ql-title {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.015em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.quicklook-head .ql-sub {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.quicklook-head .ql-nav {
  display: flex; gap: 4px;
}
.quicklook-head .ql-nav button,
.quicklook-head .ql-close {
  width: 28px; height: 28px; border-radius: 6px;
  display: grid; place-items: center;
  color: var(--text-muted);
  transition: background .12s, color .12s;
}
.quicklook-head .ql-nav button:hover,
.quicklook-head .ql-close:hover { background: var(--bg-inset); color: var(--text-primary); }

.quicklook-body {
  background: var(--bg-canvas);
  display: grid; place-items: center;
  padding: 20px;
  flex: 1; min-height: 0;
  overflow: auto;
}
.quicklook-body .ql-preview {
  width: 100%; max-width: 760px;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: var(--radius-md);
  position: relative;
  overflow: hidden;
  display: grid; place-items: center;
  color: rgba(255,255,255,0.5);
  font-family: var(--font-mono); font-size: 12px;
}

.quicklook-meta {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 18px;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-inset);
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.quicklook-meta .meta-cell { display: flex; gap: 5px; }
.quicklook-meta .meta-cell .k { color: var(--text-muted); }
.quicklook-meta .meta-cell .v { color: var(--text-secondary); }

.quicklook-foot {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px;
  border-top: 1px solid var(--border-subtle);
}
.quicklook-foot .grow { flex: 1; }
.quicklook-foot .kbd-hints {
  display: flex; gap: 10px; align-items: center;
  font-size: 11px; color: var(--text-muted);
}

/* ---- Detail Drawer (sağdan açılan, BÜYÜK) ---- */
.drawer-veil {
  position: fixed; inset: 0;
  background: var(--bg-overlay);
  z-index: 90;
  animation: fade-in .2s;
}
.drawer-detail {
  position: fixed; right: 0; top: 0; bottom: 0;
  width: min(640px, 92vw);
  background: var(--bg-surface);
  border-left: 1px solid var(--border-default);
  box-shadow: var(--shadow-2xl);
  z-index: 95;
  display: flex; flex-direction: column;
  animation: slide-in .24s var(--motion-ease-out);
  transition: width .24s var(--motion-ease-out);
}
.drawer-detail.expanded { width: min(820px, 96vw); }
.drawer-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
}
.drawer-head .titles { flex: 1; min-width: 0; }
.drawer-head .crumb {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.drawer-head .title {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.015em;
}
.drawer-head .actions {
  display: flex; gap: 4px;
}
.drawer-head .actions button {
  width: 28px; height: 28px; border-radius: 6px;
  display: grid; place-items: center;
  color: var(--text-muted);
  transition: background .12s, color .12s;
}
.drawer-head .actions button:hover { background: var(--bg-inset); color: var(--text-primary); }

.drawer-tabs {
  display: flex; gap: 2px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border-subtle);
}
.drawer-tabs .tab {
  padding: 10px 12px;
  font-size: 12px; font-weight: 500;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .12s, border-color .12s;
}
.drawer-tabs .tab:hover { color: var(--text-primary); }
.drawer-tabs .tab.active {
  color: var(--accent-primary);
  border-bottom-color: var(--accent-primary);
}

.drawer-body {
  flex: 1; overflow-y: auto;
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 18px;
}

.drawer-foot {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px;
  border-top: 1px solid var(--border-subtle);
  background: var(--bg-surface);
}
.drawer-foot .grow { flex: 1; }

/* ============================================================
   Animations & reduced motion
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    transition-duration: 0.001ms !important;
  }
}

// ---- Media Preview ----
// variant: "thumb" | "card" | "hero" | "audio"
const MediaPreview = ({
  variant = "card",
  src,                  // background image URL (thumbnail)
  duration,             // "02:34"
  quality,              // "HD" | "4K"
  loading = false,
  error = false,
  onClick,              // primary action — opens drawer or inline player
  onQuickLook,          // eye icon click — opens QuickLook overlay
  waveform,             // for audio variant — array of 0..1 amplitudes
  played = 0,           // for audio — fraction played 0..1
}) => {
  if (error) {
    return (
      <div className={`media-preview error ${variant}`}>
        <Icon name="alert-circle" size={18} />
      </div>
    );
  }
  if (variant === "audio") {
    const bars = waveform || Array.from({length: 40}, (_, i) => 0.2 + Math.abs(Math.sin(i * 0.7)) * 0.8);
    return (
      <div className="media-preview audio" onClick={onClick}>
        <button className="btn icon sm ghost" onClick={(e) => { e.stopPropagation(); onClick && onClick(e); }}>
          <Icon name="play" size={12} />
        </button>
        <div className="waveform">
          {bars.map((amp, i) => (
            <div key={i}
              className={"bar" + (i / bars.length < played ? " played" : "")}
              style={{ height: `${amp * 100}%` }} />
          ))}
        </div>
        {duration && <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--text-muted)"}}>{duration}</span>}
      </div>
    );
  }
  return (
    <div className={`media-preview ${variant}`} onClick={onClick}>
      {loading
        ? <div className="mp-skeleton" />
        : <div className="mp-bg" style={src ? { backgroundImage: `url(${src})` } : undefined} />
      }
      {!loading && (
        <>
          <div className="mp-play">
            <div className="pbtn"><Icon name="play" size={variant === "thumb" ? 12 : 18} /></div>
          </div>
          {(duration || quality) && (
            <div className="mp-meta">
              {duration && <span className="duration">{duration}</span>}
              {quality && variant !== "thumb" && <span className="quality">{quality}</span>}
            </div>
          )}
          {onQuickLook && variant !== "thumb" && (
            <button className="mp-quicklook" onClick={(e) => { e.stopPropagation(); onQuickLook(e); }}>
              <Icon name="eye" size={12} />
            </button>
          )}
        </>
      )}
    </div>
  );
};

// ---- QuickLook overlay ----
// item: { title, subtitle, thumb, preview (ReactNode), meta: [{k,v}...], actions: [{label, onClick, variant}] }
const QuickLook = ({ item, onClose, onPrev, onNext, hasPrev = false, hasNext = false }) => {
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft" && hasPrev) onPrev && onPrev();
      if (e.key === "ArrowRight" && hasNext) onNext && onNext();
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [hasPrev, hasNext]);

  if (!item) return null;
  return (
    <div className="quicklook-veil" onClick={onClose}>
      <div className="quicklook" onClick={e => e.stopPropagation()}>
        <div className="quicklook-head">
          {item.thumb && (
            <div className="ql-thumb" style={{backgroundImage: `url(${item.thumb})`}} />
          )}
          <div className="ql-titles">
            <div className="ql-title">{item.title}</div>
            {item.subtitle && <div className="ql-sub">{item.subtitle}</div>}
          </div>
          <div className="ql-nav">
            <button onClick={onPrev} disabled={!hasPrev} title="Önceki (←)"><Icon name="chevron-left" size={14} /></button>
            <button onClick={onNext} disabled={!hasNext} title="Sonraki (→)"><Icon name="chevron-right" size={14} /></button>
          </div>
          <button className="ql-close" onClick={onClose} title="Kapat (esc)"><Icon name="x" size={14} /></button>
        </div>
        <div className="quicklook-body">
          <div className="ql-preview">
            {item.preview || "[önizleme yüklenemedi]"}
          </div>
        </div>
        {item.meta && item.meta.length > 0 && (
          <div className="quicklook-meta">
            {item.meta.map((m, i) => (
              <div key={i} className="meta-cell"><span className="k">{m.k}:</span><span className="v">{m.v}</span></div>
            ))}
          </div>
        )}
        <div className="quicklook-foot">
          <div className="kbd-hints">
            <span><span className="kbd">←→</span> gezin</span>
            <span><span className="kbd">esc</span> kapat</span>
          </div>
          <div className="grow" />
          {item.actions && item.actions.map((a, i) => (
            <button key={i} className={`btn ${a.variant || "secondary"} sm`} onClick={a.onClick}>{a.label}</button>
          ))}
        </div>
      </div>
    </div>
  );
};

// ---- Detail Drawer (right slide-in, sürekli kullanılan) ----
// item: { breadcrumb, title, tabs: [{id,label}], children, actions: [...] }
const DetailDrawer = ({ item, onClose, defaultTab, expandable = true }) => {
  const [tab, setTab] = useState(defaultTab || (item?.tabs?.[0]?.id));
  const [expanded, setExpanded] = useState(false);

  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  if (!item) return null;
  const tabContent = item.tabs ? item.tabs.find(t => t.id === tab) : null;

  return (
    <>
      <div className="drawer-veil" onClick={onClose} />
      <aside className={"drawer-detail" + (expanded ? " expanded" : "")}>
        <div className="drawer-head">
          <div className="titles">
            {item.breadcrumb && <div className="crumb">{item.breadcrumb}</div>}
            <div className="title">{item.title}</div>
          </div>
          <div className="actions">
            {expandable && (
              <button onClick={() => setExpanded(e => !e)} title={expanded ? "Daralt" : "Genişlet"}>
                <Icon name="sliders" size={13} />
              </button>
            )}
            <button onClick={onClose} title="Kapat (esc)"><Icon name="x" size={14} /></button>
          </div>
        </div>
        {item.tabs && (
          <div className="drawer-tabs">
            {item.tabs.map(t => (
              <button key={t.id}
                className={"tab" + (tab === t.id ? " active" : "")}
                onClick={() => setTab(t.id)}>{t.label}</button>
            ))}
          </div>
        )}
        <div className="drawer-body">
          {tabContent ? tabContent.children : item.children}
        </div>
        {item.actions && item.actions.length > 0 && (
          <div className="drawer-foot">
            {item.actions.map((a, i) => (
              <React.Fragment key={i}>
                {a.spacer && <div className="grow" />}
                {!a.spacer && <button className={`btn ${a.variant || "secondary"} sm`} onClick={a.onClick}>{a.label}</button>}
              </React.Fragment>
            ))}
          </div>
        )}
      </aside>
    </>
  );
};

// ---- Toast system ----
const Toast = ({ children, variant = "default" }) => (
  <div className={`toast ${variant}`}>{children}</div>
);

// Export to global
Object.assign(window, {
