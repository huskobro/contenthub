<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Metric tiles</title>
<link rel="stylesheet" href="shell.css" />
<style>
  .tile {
    position: relative;
    padding: 16px 18px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm), var(--glow-panel-edge);
    overflow: hidden;
  }
  .tile .accent-line {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--gradient-brand);
  }
  .tile.plum .accent-line { background: linear-gradient(90deg, var(--accent-secondary) 0%, var(--accent-primary) 100%); }
  .tile.amber .accent-line { background: linear-gradient(90deg, var(--accent-tertiary) 0%, var(--accent-secondary) 100%); }
  .spark {
    width: 100%; height: 28px; margin-top: 8px;
  }
</style>
</head>
<body style="padding: 22px 24px;">
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">

    <div class="tile">
      <div class="accent-line"></div>
      <div class="type-label" style="color: var(--text-muted);">Published this week</div>
      <div style="display: flex; align-items: baseline; gap: 8px; margin-top: 8px;">
        <span class="type-number">1,284</span>
        <span class="type-mono" style="color: var(--state-success-fg);">↑ 12.4%</span>
      </div>
      <svg class="spark" viewBox="0 0 200 30" fill="none">
        <path d="M0 22 L25 20 L50 23 L75 17 L100 18 L125 12 L150 14 L175 8 L200 5" stroke="var(--accent-primary)" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M0 22 L25 20 L50 23 L75 17 L100 18 L125 12 L150 14 L175 8 L200 5 L200 30 L0 30 Z" fill="var(--accent-primary-muted)"/>
      </svg>
    </div>

    <div class="tile plum">
      <div class="accent-line"></div>
      <div class="type-label" style="color: var(--text-muted);">Queue</div>
      <div style="display: flex; align-items: baseline; gap: 8px; margin-top: 8px;">
        <span class="type-number">17</span>
        <span class="type-mono" style="color: var(--accent-secondary);">3 pending</span>
      </div>
      <svg class="spark" viewBox="0 0 200 30" fill="none">
        <rect x="8"   y="18" width="12" height="10" fill="var(--accent-secondary-muted)"/>
        <rect x="28"  y="14" width="12" height="14" fill="var(--accent-secondary-muted)"/>
        <rect x="48"  y="20" width="12" height="8"  fill="var(--accent-secondary-muted)"/>
        <rect x="68"  y="10" width="12" height="18" fill="var(--accent-secondary)"/>
        <rect x="88"  y="16" width="12" height="12" fill="var(--accent-secondary-muted)"/>
        <rect x="108" y="8"  width="12" height="20" fill="var(--accent-secondary-muted)"/>
        <rect x="128" y="12" width="12" height="16" fill="var(--accent-secondary-muted)"/>
        <rect x="148" y="6"  width="12" height="22" fill="var(--accent-secondary)"/>
        <rect x="168" y="14" width="12" height="14" fill="var(--accent-secondary-muted)"/>
      </svg>
    </div>

    <div class="tile amber">
      <div class="accent-line"></div>
      <div class="type-label" style="color: var(--text-muted);">Avg render</div>
      <div style="display: flex; align-items: baseline; gap: 8px; margin-top: 8px;">
        <span class="type-number">04:17</span>
        <span class="type-mono" style="color: var(--state-warning-fg);">+ 0:08</span>
      </div>
      <div style="margin-top: 8px; height: 28px; display: flex; align-items: end; gap: 2px;">
        <div style="flex: 1; height: 40%; background: var(--accent-tertiary-muted); border-radius: 2px;"></div>
        <div style="flex: 1; height: 55%; background: var(--accent-tertiary-muted); border-radius: 2px;"></div>
        <div style="flex: 1; height: 45%; background: var(--accent-tertiary-muted); border-radius: 2px;"></div>
        <div style="flex: 1; height: 70%; background: var(--accent-tertiary-muted); border-radius: 2px;"></div>
        <div style="flex: 1; height: 60%; background: var(--accent-tertiary); border-radius: 2px;"></div>
        <div style="flex: 1; height: 85%; background: var(--accent-tertiary-muted); border-radius: 2px;"></div>
        <div style="flex: 1; height: 72%; background: var(--accent-tertiary); border-radius: 2px;"></div>
        <div style="flex: 1; height: 92%; background: var(--accent-tertiary); border-radius: 2px; box-shadow: 0 0 8px var(--accent-tertiary);"></div>
      </div>
    </div>

  </div>
</body>
</html>
