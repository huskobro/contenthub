<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Elevation — Shadows</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 36px 24px;">
  <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px;">

    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div style="width: 70px; height: 56px; border-radius: var(--radius-md); background: var(--bg-surface); box-shadow: var(--shadow-xs);"></div>
      <div style="text-align: center;">
        <div class="type-caption" style="color: var(--text-primary);">xs</div>
        <div class="type-mono" style="color: var(--text-muted); font-size: 10px;">--shadow-xs</div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div style="width: 70px; height: 56px; border-radius: var(--radius-md); background: var(--bg-surface); box-shadow: var(--shadow-sm);"></div>
      <div style="text-align: center;">
        <div class="type-caption" style="color: var(--text-primary);">sm</div>
        <div class="type-mono" style="color: var(--text-muted); font-size: 10px;">--shadow-sm</div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div style="width: 70px; height: 56px; border-radius: var(--radius-md); background: var(--bg-surface); box-shadow: var(--shadow-md);"></div>
      <div style="text-align: center;">
        <div class="type-caption" style="color: var(--text-primary);">md</div>
        <div class="type-mono" style="color: var(--text-muted); font-size: 10px;">--shadow-md</div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div style="width: 70px; height: 56px; border-radius: var(--radius-md); background: var(--bg-surface); box-shadow: var(--shadow-lg);"></div>
      <div style="text-align: center;">
        <div class="type-caption" style="color: var(--text-primary);">lg</div>
        <div class="type-mono" style="color: var(--text-muted); font-size: 10px;">--shadow-lg</div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div style="width: 70px; height: 56px; border-radius: var(--radius-md); background: var(--bg-surface); box-shadow: var(--shadow-xl);"></div>
      <div style="text-align: center;">
        <div class="type-caption" style="color: var(--text-primary);">xl</div>
        <div class="type-mono" style="color: var(--text-muted); font-size: 10px;">--shadow-xl</div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
      <div style="width: 70px; height: 56px; border-radius: var(--radius-md); background: var(--bg-surface); box-shadow: var(--shadow-2xl);"></div>
      <div style="text-align: center;">
        <div class="type-caption" style="color: var(--text-primary);">2xl</div>
        <div class="type-mono" style="color: var(--text-muted); font-size: 10px;">--shadow-2xl</div>
      </div>
    </div>

  </div>
</body>
</html>
