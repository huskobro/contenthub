<meta charset="utf-8" />
<title>Iconography</title>
<link rel="stylesheet" href="shell.css" />
<style>
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
  .ic {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-inset);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    transition: all var(--motion-duration-normal) var(--motion-ease-out);
  }
  .ic:hover { color: var(--accent-primary-hover); border-color: var(--accent-primary); background: var(--accent-primary-muted); }
</style>
</head>
