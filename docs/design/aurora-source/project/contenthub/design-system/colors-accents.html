<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Colors — Accents</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 24px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px;">
    <!-- Primary (teal) -->
    <div style="background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-sm);">
      <div style="height: 44px; border-radius: var(--radius-sm); background: var(--accent-primary); box-shadow: var(--glow-accent);"></div>
      <div class="type-caption" style="margin-top: 10px; color: var(--text-primary);">primary · teal</div>
      <div class="type-mono" style="color: var(--text-muted);">#3BC8B8</div>
      <div style="display: flex; gap: 6px; margin-top: 10px;">
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-primary-muted);" title="muted"></div>
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-primary-hover);" title="hover"></div>
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-primary-strong);" title="strong"></div>
      </div>
    </div>
    <!-- Secondary (plum) -->
    <div style="background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-sm);">
      <div style="height: 44px; border-radius: var(--radius-sm); background: var(--accent-secondary); box-shadow: var(--glow-secondary);"></div>
      <div class="type-caption" style="margin-top: 10px; color: var(--text-primary);">secondary · plum</div>
      <div class="type-mono" style="color: var(--text-muted);">#B07AD8</div>
      <div style="display: flex; gap: 6px; margin-top: 10px;">
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-secondary-muted);"></div>
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-secondary-hover);"></div>
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-secondary);"></div>
      </div>
    </div>
    <!-- Tertiary (amber) -->
    <div style="background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-sm);">
      <div style="height: 44px; border-radius: var(--radius-sm); background: var(--accent-tertiary);"></div>
      <div class="type-caption" style="margin-top: 10px; color: var(--text-primary);">tertiary · amber</div>
      <div class="type-mono" style="color: var(--text-muted);">#E8B87A</div>
      <div style="display: flex; gap: 6px; margin-top: 10px;">
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-tertiary-muted);"></div>
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-tertiary);"></div>
        <div style="flex: 1; height: 18px; border-radius: 4px; background: var(--accent-tertiary);"></div>
      </div>
    </div>
  </div>
</body>
</html>
