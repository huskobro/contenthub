<!doctype html>
<html lang="tr" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Detail Drawer</title>
<link rel="stylesheet" href="shell.css" />
<style>
  body { padding: 24px; overflow: hidden; }
  .stage { position: relative; height: 540px; background: var(--gradient-aurora); border-radius: var(--radius-lg); overflow: hidden; }
  .stage::before { content: ""; position: absolute; inset: 0; background: rgba(5,3,12,0.4); }
  .ghost { position: absolute; inset: 0; padding: 24px; }
  .ghost .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .ghost .blk { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 14px 16px; margin-top: 8px; opacity: 0.4; }
  .ghost .blk .t { height: 8px; background: var(--text-muted); border-radius: 4px; width: 60%; opacity: 0.4; }
  .ghost .blk .s { height: 6px; background: var(--text-muted); border-radius: 3px; width: 40%; margin-top: 6px; opacity: 0.3; }

  .dr {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 460px;
    background: var(--bg-surface);
    border-left: 1px solid var(--border-default);
    box-shadow: var(--shadow-2xl);
    display: flex; flex-direction: column;
  }
  .dh { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border-subtle); }
  .dh .ti { flex: 1; min-width: 0; }
  .dh .cr { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .dh .t { font-family: var(--font-display); font-size: 16px; font-weight: 500; color: var(--text-primary); letter-spacing: -0.015em; }
  .dh .ax { display: flex; gap: 4px; }
  .dh .ax button { width: 26px; height: 26px; border-radius: 6px; background: transparent; border: none; color: var(--text-muted); display: grid; place-items: center; }
  .dh .ax button:hover { background: var(--bg-inset); color: var(--text-primary); }

  .tabs { display: flex; gap: 2px; padding: 0 18px; border-bottom: 1px solid var(--border-subtle); }
  .tab { padding: 10px 12px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; background: transparent; border-top: none; border-left: none; border-right: none; }
  .tab.on { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }

  .db { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .pv { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #1a1030, #25194a); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); display: grid; place-items: center; color: var(--accent-primary-hover); font-family: var(--font-mono); font-size: 11px; }
  .card { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 14px; }
  .ovl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; }
  .step { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; font-size: 12px; color: var(--text-secondary); }
  .step.now { background: var(--accent-primary-muted); color: var(--text-primary); }
  .step .d { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); }
  .step.done .d { background: var(--state-success-fg); }
  .step.now .d { background: var(--accent-primary); box-shadow: 0 0 6px var(--accent-primary); }

  .df { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--border-subtle); }
  .df .gr { flex: 1; }
  .btn { display: inline-flex; align-items: center; height: 26px; padding: 0 12px; border-radius: 6px; font-size: 11px; font-weight: 500; border: 1px solid transparent; }
  .btn.sec { background: var(--bg-surface); color: var(--text-primary); border-color: var(--border-default); }
  .btn.pri { background: var(--gradient-brand); color: #fff; box-shadow: var(--glow-accent); }
</style>
</head>
<body>
  <div class="type-label" style="color: var(--text-muted); margin-bottom: 14px;">Detail Drawer — sağdan açılan büyük detay paneli (Inspector'dan farklı, on-demand)</div>
  <div class="stage">
    <div class="ghost">
      <div class="lab">İş kayıtları</div>
      <div class="blk"><div class="t"></div><div class="s"></div></div>
      <div class="blk"><div class="t"></div><div class="s"></div></div>
      <div class="blk"><div class="t"></div><div class="s"></div></div>
    </div>
    <div class="dr">
      <div class="dh">
        <div class="ti">
          <div class="cr">BLT-2026-042 · news_bulletin</div>
          <div class="t">Haftalık ekonomi bülteni — 18 Nisan</div>
        </div>
        <div class="ax">
          <button>⤢</button>
          <button>✕</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab on">Önizleme</button>
        <button class="tab">Pipeline</button>
        <button class="tab">Loglar</button>
      </div>
      <div class="db">
        <div class="pv">
          <div style="text-align:center">
            <div style="font-size: 32px;">▶</div>
            <div style="margin-top: 6px; opacity: 0.7;">BLT-2026-042</div>
          </div>
        </div>
        <div class="card">
          <div class="ovl">Pipeline</div>
          <div class="step done"><span class="d"></span><span style="flex:1">Kaynak seçimi</span></div>
          <div class="step done"><span class="d"></span><span style="flex:1">Editorial gate</span></div>
          <div class="step done"><span class="d"></span><span style="flex:1">Script üretim</span></div>
          <div class="step now"><span class="d"></span><span style="flex:1">Görsel üretim</span><span style="font-family: var(--font-mono); font-size: 10px; color: var(--accent-primary-hover);">64%</span></div>
          <div class="step"><span class="d"></span><span style="flex:1">Render</span></div>
        </div>
      </div>
      <div class="df">
        <button class="btn sec">Yeniden başlat</button>
        <div class="gr"></div>
        <button class="btn sec">Reddet</button>
        <button class="btn pri">Onayla</button>
      </div>
    </div>
  </div>
</body>
</html>
