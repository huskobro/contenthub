<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Spacing & Radii</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 24px;">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 28px;">

    <div>
      <div class="type-label" style="color: var(--text-muted); margin-bottom: 14px;">Spacing · 4px base</div>
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <!-- Each row = space token -->
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-1</span>
          <div style="height: 4px; width: 4px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">4px</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-2</span>
          <div style="height: 4px; width: 8px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">8px</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-3</span>
          <div style="height: 4px; width: 12px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">12px</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-4</span>
          <div style="height: 4px; width: 16px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">16px</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-6</span>
          <div style="height: 4px; width: 24px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">24px</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-8</span>
          <div style="height: 4px; width: 32px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">32px</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span class="type-mono" style="color: var(--text-muted); width: 72px;">space-12</span>
          <div style="height: 4px; width: 48px; background: var(--accent-primary); border-radius: 1px;"></div>
          <span class="type-mono" style="color: var(--text-secondary);">48px</span>
        </div>
      </div>
    </div>

    <div>
      <div class="type-label" style="color: var(--text-muted); margin-bottom: 14px;">Corner radii</div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
          <div style="width: 48px; height: 48px; background: var(--gradient-brand-subtle); border: 1px solid var(--border-strong); border-radius: var(--radius-xs);"></div>
          <span class="type-mono" style="color: var(--text-muted);">xs · 4</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
          <div style="width: 48px; height: 48px; background: var(--gradient-brand-subtle); border: 1px solid var(--border-strong); border-radius: var(--radius-sm);"></div>
          <span class="type-mono" style="color: var(--text-muted);">sm · 6</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
          <div style="width: 48px; height: 48px; background: var(--gradient-brand-subtle); border: 1px solid var(--border-strong); border-radius: var(--radius-md);"></div>
          <span class="type-mono" style="color: var(--text-muted);">md · 10</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
          <div style="width: 48px; height: 48px; background: var(--gradient-brand-subtle); border: 1px solid var(--border-strong); border-radius: var(--radius-lg);"></div>
          <span class="type-mono" style="color: var(--text-muted);">lg · 14</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
          <div style="width: 48px; height: 48px; background: var(--gradient-brand-subtle); border: 1px solid var(--border-strong); border-radius: var(--radius-xl);"></div>
          <span class="type-mono" style="color: var(--text-muted);">xl · 20</span>
        </div>
        <div style="display: flex; flex-direction: column; align-items: flex-start; gap: 6px;">
          <div style="width: 48px; height: 48px; background: var(--gradient-brand-subtle); border: 1px solid var(--border-strong); border-radius: var(--radius-pill);"></div>
          <span class="type-mono" style="color: var(--text-muted);">pill</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
