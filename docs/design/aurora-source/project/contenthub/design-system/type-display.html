<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Type — Display & Headings</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 28px 32px;">
  <div style="display: grid; grid-template-columns: 120px 1fr; gap: 18px 20px; align-items: baseline;">
    <div class="type-label" style="color: var(--text-muted);">Display</div>
    <div><span class="type-display" style="background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent;">Aurora Dusk</span>
      <div class="type-mono" style="margin-top: 4px; color: var(--text-muted);">42 / 500 / -0.035em · Geist</div>
    </div>

    <div class="type-label" style="color: var(--text-muted);">H1</div>
    <div><span class="type-h1">Publish center</span>
      <div class="type-mono" style="margin-top: 4px; color: var(--text-muted);">28 / 500 / -0.028em</div>
    </div>

    <div class="type-label" style="color: var(--text-muted);">H2</div>
    <div><span class="type-h2">Scheduled for tomorrow</span>
      <div class="type-mono" style="margin-top: 4px; color: var(--text-muted);">20 / 500 / -0.022em</div>
    </div>

    <div class="type-label" style="color: var(--text-muted);">H3</div>
    <div><span class="type-h3">Job BLT-2026-042</span>
      <div class="type-mono" style="margin-top: 4px; color: var(--text-muted);">16 / 500 / -0.015em</div>
    </div>
  </div>
</body>
</html>
