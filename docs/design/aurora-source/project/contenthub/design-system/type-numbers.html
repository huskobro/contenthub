<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Type — Numeric & Tabular</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 28px 32px;">
  <div style="display: flex; gap: 32px; align-items: center;">

    <div class="vstack" style="gap: 4px;">
      <span class="type-label" style="color: var(--text-muted);">This week</span>
      <span class="type-number" style="background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent;">1,284</span>
      <span class="type-mono" style="color: var(--state-success-fg);">↑ 12.4%</span>
    </div>

    <div style="width: 1px; align-self: stretch; background: var(--border-subtle);"></div>

    <div class="vstack" style="gap: 4px;">
      <span class="type-label" style="color: var(--text-muted);">Published</span>
      <span class="type-number">042</span>
      <span class="type-mono" style="color: var(--text-muted);">of 128 scheduled</span>
    </div>

    <div style="width: 1px; align-self: stretch; background: var(--border-subtle);"></div>

    <div class="vstack" style="gap: 4px;">
      <span class="type-label" style="color: var(--text-muted);">Avg render</span>
      <span class="type-number">04:17</span>
      <span class="type-mono" style="color: var(--text-muted);">per bulletin</span>
    </div>

    <div style="width: 1px; align-self: stretch; background: var(--border-subtle);"></div>

    <div class="vstack" style="gap: 4px;">
      <span class="type-label" style="color: var(--text-muted);">Queue</span>
      <div style="display: flex; align-items: baseline; gap: 6px;">
        <span class="type-number">17</span>
        <span class="type-body-sm" style="color: var(--text-muted);">jobs</span>
      </div>
      <span class="type-mono" style="color: var(--accent-secondary);">3 pending review</span>
    </div>

  </div>
</body>
</html>
