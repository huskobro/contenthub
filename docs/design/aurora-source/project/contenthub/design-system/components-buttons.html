<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Buttons</title>
<link rel="stylesheet" href="shell.css" />
<style>
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; letter-spacing: -0.005em;
    transition: all var(--motion-duration-normal) var(--motion-ease-out);
    border: 1px solid transparent;
    font-family: var(--font-sans);
  }
  .btn.primary {
    background: var(--gradient-brand);
    color: var(--text-on-accent);
    box-shadow: var(--shadow-sm), var(--glow-accent);
  }
  .btn.primary:hover { box-shadow: var(--shadow-md), var(--glow-accent-strong); }
  .btn.secondary {
    background: var(--bg-elevated);
    color: var(--text-primary);
    border-color: var(--border-default);
  }
  .btn.secondary:hover { border-color: var(--border-contrast); background: var(--bg-surface); }
  .btn.ghost {
    background: transparent; color: var(--text-secondary);
  }
  .btn.ghost:hover { background: var(--accent-primary-muted); color: var(--accent-primary-hover); }
  .btn.danger {
    background: var(--state-danger-bg);
    color: var(--state-danger-fg);
    border-color: var(--state-danger-border);
  }
  .btn.danger:hover { background: color-mix(in oklab, var(--state-danger-bg), #000 10%); }
  .btn.pill { border-radius: var(--radius-pill); padding: 6px 14px; }
  .btn.icon { width: 32px; height: 32px; padding: 0; justify-content: center; }
  svg { flex-shrink: 0; }
</style>
</head>
<body style="padding: 22px 24px;">
  <div class="type-label" style="color: var(--text-muted); margin-bottom: 14px;">Buttons</div>

  <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px;">
    <button class="btn primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Yeni video oluştur
    </button>
    <button class="btn secondary">Önizleme</button>
    <button class="btn ghost">İptal</button>
    <button class="btn danger">Sil</button>
  </div>

  <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
    <button class="btn primary pill">Yayınla</button>
    <button class="btn secondary pill">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Onayla
    </button>
    <button class="btn secondary icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
    <button class="btn ghost icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
    <button class="btn secondary" disabled style="opacity: 0.45;">Devre dışı</button>
  </div>
</body>
</html>
