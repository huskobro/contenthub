<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Brand — Logo & identity</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 24px;">
  <div style="display: grid; grid-template-columns: 220px 1fr; gap: 20px; align-items: center;">

    <!-- Logo lockup -->
    <div style="aspect-ratio: 1; background: var(--bg-canvas); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
      <div style="position: absolute; inset: 0; background: var(--gradient-aurora-soft); opacity: 0.8;"></div>
      <div style="position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px;">
        <!-- Mark -->
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <defs>
            <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"   stop-color="#26b6a6"/>
              <stop offset="45%"  stop-color="#3bc8b8"/>
              <stop offset="100%" stop-color="#b07ad8"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="52" height="52" rx="14" fill="url(#markGrad)" opacity="0.14"/>
          <path d="M18 34 L28 16 L38 34" stroke="url(#markGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="28" cy="40" r="2.5" fill="url(#markGrad)"/>
        </svg>
        <div style="display: flex; align-items: baseline; gap: 2px;">
          <span style="font-family: var(--font-display); font-size: 20px; font-weight: 500; letter-spacing: -0.025em; color: var(--text-primary);">content</span>
          <span style="font-family: var(--font-display); font-size: 20px; font-weight: 500; letter-spacing: -0.025em; background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent;">hub</span>
        </div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 14px;">
      <div>
        <div class="type-label" style="color: var(--text-muted);">Wordmark</div>
        <div style="display: flex; align-items: baseline; gap: 2px; margin-top: 8px;">
          <span style="font-family: var(--font-display); font-size: 32px; font-weight: 500; letter-spacing: -0.03em; color: var(--text-primary);">content</span>
          <span style="font-family: var(--font-display); font-size: 32px; font-weight: 500; letter-spacing: -0.03em; background: var(--gradient-brand); -webkit-background-clip: text; background-clip: text; color: transparent;">hub</span>
        </div>
      </div>
      <div>
        <div class="type-label" style="color: var(--text-muted);">Tagline</div>
        <div class="type-body" style="color: var(--text-secondary); margin-top: 6px;">Görünürlük önce. Deterministik önce. Yerel önce.</div>
      </div>
      <div>
        <div class="type-label" style="color: var(--text-muted);">Signature</div>
        <div class="type-mono" style="color: var(--text-muted); margin-top: 6px;">Aurora Dusk · theme-01</div>
      </div>
    </div>

  </div>
</body>
</html>
