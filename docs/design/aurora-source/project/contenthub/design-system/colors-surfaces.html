<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Colors — Surfaces</title>
<link rel="stylesheet" href="shell.css" />
</head>
<body style="padding: 24px;">
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <!-- Canvas -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-canvas); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">canvas</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-canvas</div>
      </div>
    </div>
    <!-- Surface -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-surface); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">surface</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-surface</div>
      </div>
    </div>
    <!-- Elevated -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-elevated); border: 1px solid var(--border-subtle); box-shadow: var(--shadow-md);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">elevated</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-elevated</div>
      </div>
    </div>
    <!-- Inset -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-inset); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">inset</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-inset</div>
      </div>
    </div>
    <!-- Sidebar -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-sidebar); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">sidebar</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-sidebar</div>
      </div>
    </div>
    <!-- Sidebar hover -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-sidebar-hover); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">sidebar hover</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-sidebar-hover</div>
      </div>
    </div>
    <!-- Sidebar active -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-sidebar-active); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">sidebar active</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-sidebar-active</div>
      </div>
    </div>
    <!-- Tooltip -->
    <div style="display: flex; flex-direction: column; gap: 8px;">
      <div style="height: 72px; border-radius: var(--radius-md); background: var(--bg-tooltip); border: 1px solid var(--border-subtle);"></div>
      <div>
        <div class="type-caption" style="color: var(--text-primary);">tooltip</div>
        <div class="type-mono" style="color: var(--text-muted);">--bg-tooltip</div>
      </div>
    </div>
  </div>
</body>
</html>
