<!doctype html>
<html lang="en" data-theme="aurora-dusk">
<head>
<meta charset="utf-8" />
<title>Navigation rail</title>
<link rel="stylesheet" href="shell.css" />
<style>
  .rail {
    width: 56px;
    background: var(--bg-sidebar);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 10px 0;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    box-shadow: var(--shadow-lg);
    height: 320px;
  }
  .rail .brand {
    width: 32px; height: 32px; border-radius: var(--radius-sm);
    background: var(--gradient-brand); display: flex; align-items: center; justify-content: center;
    color: var(--text-on-accent); font-weight: 600; font-size: 13px;
    box-shadow: var(--glow-accent);
    margin-bottom: 8px;
  }
  .rail .item {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: all var(--motion-duration-normal) var(--motion-ease-out);
    position: relative;
  }
  .rail .item:hover { color: var(--text-primary); background: var(--bg-sidebar-hover); }
  .rail .item.active {
    color: var(--accent-primary-hover);
    background: var(--bg-sidebar-active);
    box-shadow: var(--glow-accent);
  }
  .rail .item.active::before {
    content: ""; position: absolute; left: -2px; top: 6px; bottom: 6px;
    width: 2px; border-radius: 2px;
    background: var(--gradient-brand);
    box-shadow: var(--glow-accent);
  }
  .rail .spacer { flex: 1; }
  .panel {
    flex: 1;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 8px;
    box-shadow: var(--shadow-md);
    height: 320px;
  }
  .panel h3 {
    margin: 0; font-size: 12px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .panel .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--text-secondary);
    transition: all var(--motion-duration-normal) var(--motion-ease-out);
  }
  .panel .nav-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .panel .nav-item.active {
    background: var(--accent-primary-muted);
    color: var(--accent-primary-hover);
  }
  .panel .nav-item .c { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-left: auto; }
</style>
</head>
<body style="padding: 22px 24px;">
  <div style="display: flex; gap: 12px;">

    <div class="rail">
      <div class="brand">C</div>
      <div class="item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4Z"/></svg>
      </div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="spacer"></div>
      <div class="item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>

    <div class="panel">
      <h3>Content</h3>
      <div class="nav-item active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        Jobs registry <span class="c">17</span>
      </div>
      <div class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
        Publish center <span class="c">3</span>
      </div>
      <div class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        News sources
      </div>
      <div class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Calendar
      </div>
      <h3 style="margin-top: 10px;">Ops</h3>
      <div class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/></svg>
        Analytics
      </div>
    </div>
  </div>
</body>
</html>
